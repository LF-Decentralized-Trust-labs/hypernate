name: Feature request
description: Suggest an idea or enhancement for Hypernate
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please search existing issues first to avoid
        duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Describe the use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have considered.
    validations:
      required: false
